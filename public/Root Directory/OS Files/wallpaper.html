<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeroOS Wallpaper Settings</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            font-weight: 400;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .wallpaper-option {
            width: 100%;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .wallpaper-option:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255,123,0,0.4);
        }
        .wallpaper-option.selected {
            border-color: #ff7b00;
            transform: scale(1.05);
        }
        .custom-upload {
            background-color: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        input[type="file"] {
            margin-top: 10px;
            margin-bottom: 15px;
        }
        button {
            background-color: #ff7b00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #e66a00;
        }
    </style>
</head>
<body>
    <h1>HeroOS Personalization</h1>
    
    <h3>Choose a Preset</h3>
    <div class="gallery" id="presetGallery">
        <img src="../../Customize HeroOS/Background Wallpaper/wallpaper.jpg" class="wallpaper-option" onclick="selectPreset(this, '../../Customize HeroOS/Background Wallpaper/wallpaper.jpg')">
        <img src="../../Customize HeroOS/Background Wallpaper/HeroOSWaves2.png" class="wallpaper-option" onclick="selectPreset(this, '../../Customize HeroOS/Background Wallpaper/HeroOSWaves2.png')">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" class="wallpaper-option" onclick="selectPreset(this, 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop')">
        <img src="https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2574&auto=format&fit=crop" class="wallpaper-option" onclick="selectPreset(this, 'https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=2574&auto=format&fit=crop')">
    </div>

    <div class="custom-upload">
        <h3>Or Upload Custom Wallpaper</h3>
        <input type="file" accept="image/*" id="imageInput"><br>
        <button onclick="setCustomWallpaper()">Set Custom Wallpaper</button>
    </div>

    <script>
        function selectPreset(element, url) {
            document.querySelectorAll('.wallpaper-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            localStorage.setItem('wallpaper', url);
            
            // Inform the parent window / actual OS
            if (window.parent) {
                window.parent.document.body.style.backgroundImage = `url('${url}')`;
            }
            alert('Wallpaper updated successfully to ' + url);
        }

        function setCustomWallpaper() {
            const inputElement = document.getElementById('imageInput');
            const file = inputElement.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const imageDataUrl = e.target.result;
                    localStorage.setItem('wallpaper', imageDataUrl);
                    
                    if (window.parent) {
                        window.parent.document.body.style.backgroundImage = `url('${imageDataUrl}')`;
                    }
                    alert('Custom wallpaper set successfully!');
                };
                reader.readAsDataURL(file);
            } else {
                alert('Please select an image first.');
            }
        }
    </script>
</body>
</html>
